<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System Simulation</title>
    <link rel="stylesheet" href="style.css?v=7">
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
    <div id="error-log"
        style="position:absolute; top:10px; left:10px; color:red; z-index:999999; font-size:24px; background:white; padding:10px; display:none;">
    </div>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const el = document.getElementById('error-log');
            el.style.display = 'block';
            el.innerHTML += message + '<br>' + source + ':' + lineno + '<hr>';
        };
        window.addEventListener('unhandledrejection', function (event) {
            const el = document.getElementById('error-log');
            el.style.display = 'block';
            el.innerHTML += 'Promise: ' + event.reason + '<hr>';
        });
    </script>
    <div id="canvas-container"></div>

    <!-- Left Navigation UI -->
    <div id="ui-left" class="ui-side-left">
        <h1>Celestial Explorer</h1>
        <p>Double-click object to focus • Drag to rotate</p>

        <div id="nav-panel" class="nav-panel">
            <div class="nav-title">Planets</div>
            <div id="nav-list" class="nav-list">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Right Data & Controls UI -->
    <div id="ui-right" class="ui-side-right">
        <button id="pause-button" class="pause-btn">⏸ PAUSE</button>
        <button id="autorotate-button" class="pause-btn" style="margin-top: 10px;">🔄 AUTO-PAN: ON</button>
        <button id="highvis-button" class="pause-btn" style="margin-top: 10px;">☀️ HIGH-VIS</button>
        <button id="overview-button" class="pause-btn" style="margin-top: 10px;">🌌 OVERVIEW</button>
        <button id="asteroid-belt-button" class="pause-btn" style="margin-top: 10px;">☄️ ASTEROID BELT: ON</button>
        <button id="kuiper-belt-button" class="pause-btn" style="margin-top: 10px;">❄️ KUIPER BELT: ON</button>
        <button id="pilot-button" class="pause-btn" style="margin-top: 10px;">🚀 PILOT SHIP</button>
        <button id="spawn-button" class="pause-btn" style="margin-top: 10px;">➕ SPAWN PLANET</button>
        <button id="lang-button" class="pause-btn lang-btn" style="margin-top: 10px;">🌐 中文</button>

        <div id="info-panel" class="info-panel">
            <div id="info-name" class="info-name">Earth</div>
            <div id="info-mass" class="info-mass">Mass: 5.972 × 10²⁴ kg</div>
            <div id="info-radius" class="info-mass" style="margin-top: 4px;">Radius: 6,371 km</div>
            <div id="info-density" class="info-mass" style="margin-top: 4px;">Density: 5.51 g/cm³</div>
            <div id="info-relative" class="info-relative">~ 1.0 Earth Mass</div>
        </div>
    </div>

    <!-- Pilot HUD -->
    <div id="pilot-hud"
        style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 12px; border: 1px solid #00ffff; color: #00ffff; font-family: 'Outfit', sans-serif; pointer-events: none; z-index: 1000; text-align: center; box-shadow: 0 0 20px rgba(0,255,255,0.2);">
        <div style="font-weight: bold; margin-bottom: 5px; font-size: 1.2rem;">FLIGHT SYSTEMS ACTIVE</div>
        <div id="pilot-instr" style="font-size: 0.9rem; opacity: 0.9;">W/S: Thrust • A/D: Yaw • Q/E: Roll • Arrows:
            Pitch</div>
    </div>

    <!-- Spawn Custom Planet Modal -->
    <div id="spawn-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Customize Planet</h2>

            <div class="modal-group">
                <label id="modal-lbl-template">Base Template:</label>
                <select id="spawn-template" class="modal-input">
                    <option value="Random" id="opt-random">🎲 Random (随机)</option>
                    <!-- Options populated dynamically -->
                </select>
            </div>

            <div class="modal-group">
                <label id="modal-lbl-distance">Orbit Distance:</label>
                <div class="range-container">
                    <input type="range" id="spawn-distance" min="100" max="6000" step="50" value="1000"
                        class="modal-input">
                    <span id="spawn-distance-val">1000</span>
                </div>
            </div>

            <div class="modal-group">
                <label id="modal-lbl-mass">Mass Multiplier:</label>
                <div class="range-container">
                    <input type="range" id="spawn-mass" min="0.1" max="100.0" step="0.1" value="1.0"
                        class="modal-input">
                    <span id="spawn-mass-val">1.0 x</span>
                </div>
            </div>

            <div class="modal-actions">
                <button id="modal-cancel-btn" class="pause-btn modal-btn">CANCEL</button>
                <button id="modal-confirm-btn" class="pause-btn modal-btn"
                    style="background: rgba(79, 166, 255, 0.2); border-color: #4fa6ff;">SPAWN!</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=5"></script>
</body>

</html>
